<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品分类首页</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Inter", "微软雅黑", sans-serif;
  }
  body {
    background: #f8f9fa;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .category-container {
    width: 100%;
    max-width: 450px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    padding: 2rem;
    background: rgba(255,255,255,0.8);
    border-radius: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.04);
    border: 1px solid rgba(255,255,255,0.5);
  }
  .page-title {
    text-align: center;
    font-size: 1.4rem;
    font-weight: 600;
    color: #2d3748;
    margin-bottom: 0.5rem;
  }
  .home-search-bar {
    display: flex;
    gap: 0.6rem;
    margin-bottom: 0.5rem;
  }
  .home-search-input {
    flex: 1;
    padding: 0.9rem 1rem;
    border-radius: 14px;
    border: 1px solid #e8e8e8;
    background: #fff;
    outline: none;
  }
  .home-search-btn {
    padding: 0.9rem 1.2rem;
    border-radius: 14px;
    border: none;
    background: #333;
    color: #fff;
  }
  .category-btn {
    display: block;
    text-align: center;
    padding: 1.1rem 0;
    border-radius: 16px;
    background: #fff;
    color: #2d3748;
    text-decoration: none;
    border: 1px solid #e8e8e8;
    transition: 0.25s;
  }
  .category-btn:hover {
    background: #222;
    color: #fff;
    transform: translateY(-3px);
  }
</style>
</head>
<body>

<div class="category-container">
  <h1 class="page-title">产品系列</h1>

  <div class="home-search-bar">
    <input type="text" id="homeSearchInput" class="home-search-input" placeholder="输入序号搜索">
    <button class="home-search-btn" onclick="homeSearch()">搜索</button>
  </div>

  <a href="all.html" class="category-btn">全部产品</a>
  <a href="resin.html" class="category-btn">树脂过油系列</a>
  <a href="nylon.html" class="category-btn">尼龙系列</a>
  <a href="water.html" class="category-btn">防水系列</a>
</div>

<script>
  function homeSearch() {
    const kw = document.getElementById('homeSearchInput').value.trim();
    if (!kw) return;
    location.href = `all.html?search=${encodeURIComponent(kw)}`;
  }
  document.getElementById('homeSearchInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') homeSearch();
  });
</script>
</body>
</html>
